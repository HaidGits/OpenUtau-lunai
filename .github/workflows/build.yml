on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version"
        default: "0.0.0"
        required: true
        type: string
      release:
        type: boolean
        default: false
        description: "Release"
      beta:
        type: boolean
        default: true
        description: "Beta"
      draft:
        type: boolean
        default: true
        description: "Draft"

env:
  release-name: ${{ inputs.version }}${{ inputs.beta && ' Beta' || '' }}

jobs:
  build:
    runs-on: ${{ matrix.arch.runs-on }}

    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: win-x64, rid: win-x64, arch: x64, os: win, runs-on: windows-latest }
          - { name: win-x86, rid: win-x86, arch: x86, os: win, runs-on: windows-latest }
          - { name: win-arm64, rid: win-arm64, arch: arm64, os: win, runs-on: windows-latest }
          - { name: osx-x64, rid: osx-x64, arch: x64, os: osx, runs-on: macos-15-intel }
          - { name: osx-arm64, rid: osx-arm64, arch: arm64, os: osx, runs-on: macos-15-intel }
          - { name: linux-x64, rid: linux-x64, arch: x64, os: linux, runs-on: ubuntu-latest, linuxarch: x86_64}
          - { name: linux-arm64, rid: linux-arm64, arch: arm64, os: linux, runs-on: ubuntu-latest, linuxarch: aarch64}

    steps:
      # Setup
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Update contributors list
        run: python3 scripts/update-contributors.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install NSIS
        if: matrix.arch.os == 'win'
        shell: pwsh
        run: |
          if (Test-Path 'C:\Program Files (x86)\NSIS\makensis.exe') {
            Write-Host 'NSIS already present on runner image.'
          } else {
            choco install nsis --version=3.11.0 -y --no-progress
          }
          Add-Content $env:GITHUB_PATH 'C:\Program Files (x86)\NSIS\Bin'
          Add-Content $env:GITHUB_PATH 'C:\Program Files (x86)\NSIS'
          & 'C:\Program Files (x86)\NSIS\makensis.exe' /VERSION
      - uses: justalemon/VersionPatcher@v0.7.1
        with:
          version: ${{ inputs.version }}
          csproj-files: "OpenUtau/*.csproj"

      # Test
      - name: Test
        run: dotnet test OpenUtau.Test

      # Build
      - name: Restore
        run: dotnet restore OpenUtau -r ${{ matrix.arch.rid }}

      - name: Build (Windows and Linux)
        run: dotnet publish OpenUtau -c Release -r ${{ matrix.arch.rid }} --self-contained true -o bin/${{ matrix.arch.name }}/
        if: ${{ matrix.arch.os != 'osx' }}

      - name: Build (MacOS)
        run: dotnet msbuild OpenUtau -t:BundleApp -p:Configuration=Release -p:RuntimeIdentifier=${{ matrix.arch.rid }} -p:UseAppHost=true -p:SelfContained=true -p:OutputPath=../bin/${{ matrix.arch.name }}/
        if: ${{ matrix.arch.os == 'osx' }}
      
      - name: Write release channel info
        run: "@{Beta=$${{ inputs.beta }}} | ConvertTo-Json > bin/${{ matrix.arch.name }}/prefs-default.json"
        shell: pwsh

      # Create Zip
      - name: DirectML
        shell: cmd
        run: |
          curl -L https://www.nuget.org/api/v2/package/Microsoft.AI.DirectML/1.15.4 -o Microsoft.AI.DirectML.nupkg
          mkdir Microsoft.AI.DirectML
          tar -xf Microsoft.AI.DirectML.nupkg -C Microsoft.AI.DirectML
          copy /y Microsoft.AI.DirectML\bin\${{ matrix.arch.arch }}-${{ matrix.arch.os }}\DirectML.dll bin\${{ matrix.arch.name }}\
        if: ${{ matrix.arch.os == 'win' }}

      - name: Set executable permission
        run: chmod +x bin/${{ matrix.arch.name }}/OpenUtau-Lunai
        if: ${{ matrix.arch.os == 'linux' }}

      - name: Zip
        run: |
          cd bin/${{ matrix.arch.name }}
          7z a ../../OpenUtau-Lunai-${{ matrix.arch.name }}.zip *
        if: ${{ matrix.arch.os == 'win' }}

      - name: Tar.gz
        run: |
          cd bin/${{ matrix.arch.name }}
          tar -czf ../../OpenUtau-Lunai-${{ matrix.arch.name }}.tar.gz *
        if: ${{ matrix.arch.os == 'linux' }}

      # Create Installer
      - name: Get VC Redist
        if: matrix.arch.os == 'win'
        shell: pwsh
        run: |
          $arch = '${{ matrix.arch.arch }}'
          $url = "https://aka.ms/vs/17/release/vc_redist.$arch.exe"
          $out = "vc_redist.$arch.exe"
          $minBytes = switch ($arch) {
            'x64'   { 20MB }
            'x86'   { 10MB }
            'arm64' { 10MB }
            default { throw "Unknown architecture: $arch" }
          }
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            Write-Host "Downloading VC redist ($arch), attempt $attempt..."
            Remove-Item $out -ErrorAction SilentlyContinue
            curl.exe -L --fail --http1.1 --retry 3 --retry-all-errors --retry-delay 5 `
              --connect-timeout 30 --max-time 600 -o $out $url
            $size = (Get-Item $out).Length
            if ($size -ge $minBytes) {
              Write-Host "Downloaded $size bytes."
              exit 0
            }
            Write-Host "Download incomplete ($size bytes, expected at least $minBytes), retrying..."
            Start-Sleep -Seconds 5
          }
          throw "Failed to download VC redist for $arch after 5 attempts"

      - name: Create Installer
        uses: joncloud/makensis-action@v4.1
        with:
          script-file: OpenUtau.nsi
          arguments: "-DPRODUCT_VERSION=${{ inputs.version }} -DARCH=${{ matrix.arch.arch }}"
        if: ${{ matrix.arch.os == 'win' }}

      # Create Dmg
      - name: Create Dmg
        run: bash scripts/create-macos-dmg.sh ${{ matrix.arch.name }}
        if: ${{ matrix.arch.os == 'osx' }}

      # Create Appimage
      - name: Install LinuxDeploy
        uses: AnimMouse/setup-appimage@v1
        with:
          name: linuxdeploy
          url: https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        if: ${{ matrix.arch.os == 'linux' }}

      - name: Create appimage
        run: |
          cp OpenUtau/Assets/OpenUtau.desktop bin/${{ matrix.arch.name }}
          cp OpenUtau/Assets/OpenUtau.png bin/${{ matrix.arch.name }}
          cp OpenUtau/Assets/OpenUtau.png bin/${{ matrix.arch.name }}/.DirIcon
          cp OpenUtau/Assets/AppRun bin/${{ matrix.arch.name }}
          chmod 755 bin/${{ matrix.arch.name }}/AppRun
          ARCH=${{ matrix.arch.linuxarch }} linuxdeploy --appdir bin/${{ matrix.arch.name }} --output appimage
        if: ${{ matrix.arch.os == 'linux' }}

      # Upload Artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: OpenUtau-Lunai-${{ matrix.arch.name }}.tar.gz
          path: OpenUtau-Lunai-${{ matrix.arch.name }}.tar.gz
        if: ${{ !inputs.release && matrix.arch.os == 'linux' }}

      - uses: actions/upload-artifact@v4
        with:
          name: OpenUtau-Lunai-${{ matrix.arch.name }}.zip
          path: OpenUtau-Lunai-${{ matrix.arch.name }}.zip
        if: ${{ !inputs.release && matrix.arch.os == 'win' }}

      - uses: actions/upload-artifact@v4
        with:
          name: OpenUtau-Lunai-${{ matrix.arch.name }}.exe
          path: OpenUtau-Lunai-${{ matrix.arch.name }}.exe
        if: ${{ !inputs.release && matrix.arch.os == 'win' }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: OpenUtau-Lunai-${{ matrix.arch.name }}.AppImage
          path: OpenUtau-${{ matrix.arch.linuxarch }}.AppImage
        if: ${{ !inputs.release && matrix.arch.os == 'linux' }}

      - uses: actions/upload-artifact@v4
        with:
          name: OpenUtau-Lunai-${{ matrix.arch.name }}.dmg
          path: OpenUtau-Lunai-${{ matrix.arch.name }}.dmg
        if: ${{ !inputs.release && matrix.arch.os == 'osx' }}

      # Appcast
      - name: Appcast Windows
        shell: cmd
        run: |
          python appcast.py -v=${{ inputs.version }} -o=windows -r=${{ matrix.arch.name }} -f=OpenUtau-Lunai-${{ matrix.arch.name }}.zip
          python appcast.py -v=${{ inputs.version }} -o=windows -r=${{ matrix.arch.name }}-installer -f=OpenUtau-Lunai-${{ matrix.arch.name }}.exe
        if: ${{ inputs.release && matrix.arch.os == 'win' }}

      - name: Appcast MacOS
        run: |
          python appcast.py -v=${{ inputs.version }} -o=macos -r=${{ matrix.arch.name }} -f=OpenUtau-Lunai-${{ matrix.arch.name }}.dmg
        if: ${{ inputs.release && matrix.arch.os == 'osx' }}

      - name: Appcast Linux
        run: |
          python appcast.py -v=${{ inputs.version }} -o=linux -r=${{ matrix.arch.name }} -f=OpenUtau-Lunai-${{ matrix.arch.name }}.tar.gz
        if: ${{ inputs.release && matrix.arch.os == 'linux' }}

      # Release
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ env.release-name }}
          prerelease: ${{ inputs.beta }}
          draft: ${{ inputs.draft }}
          files: |
            appcast.${{ matrix.arch.name }}*.xml
            OpenUtau-Lunai-${{ matrix.arch.name }}.*
          body: |
            See [Getting Started](https://github.com/stakira/OpenUtau/wiki/Getting-Started) for how to use.

            If you encountered issues, see [FAQ](https://github.com/stakira/OpenUtau/wiki/FAQ)

            ## macOS says "This app is damaged"
            Open a terminal and run `xattr -rc "/Applications/OpenUtau-Lunai.app"`. Try opening OpenUtau Lunai again.
        if: ${{ inputs.release }}
